{{ $destination := .Destination }}
{{ if hasPrefix $destination "./.assets/" }}
  {{ $destination = replace $destination "./.assets/" "./assets/" }}
{{ else if hasPrefix $destination "/.assets/" }}
  {{ $destination = replace $destination "/.assets/" "/assets/" }}
{{ end }}
<img src="/imgs/img-lazy-loading.gif" data-src="{{ $destination | safeURL }}" alt="{{ .Text }}" {{ with .Title}} title="{{ . }}"{{ end }} />
